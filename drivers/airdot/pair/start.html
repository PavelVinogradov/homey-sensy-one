<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Add AirDot</title></head>
<body>
  <header class="homey-header">
    <h1 class="homey-title">Add AirDot</h1>
    <p class="homey-subtitle">Choose how to add the sensor.</p>
  </header>

  <button class="homey-button-primary-full" id="discover">Discover on network (mDNS)</button>
  <br/><br/>
  <button class="homey-button-secondary-full" id="manual">Add manually by IP</button>

  <script>
    document.getElementById('discover').addEventListener('click', () => {
      Homey.showView('list_devices');
    });
    document.getElementById('manual').addEventListener('click', () => {
      Homey.showView('manual');
    });
  </script>
</body>
</html>
